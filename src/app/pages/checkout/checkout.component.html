<div class="checkout-container">
  <h2>Checkout</h2>

  <div class="steps">
    <div
      [class.active]="currentStep === 1"
      [class.completed]="currentStep > 1"
      [class.inactive]="currentStep < 1"
    >
      <div class="step-icon">📝</div>
      <div class="step-text">Personal Info</div>
    </div>

    <div
      [class.active]="currentStep === 2"
      [class.completed]="currentStep > 2"
      [class.inactive]="currentStep < 2"
    >
      <div class="step-icon">🚚</div>
      <div class="step-text">Delivery Option</div>
    </div>

    <div
      [class.active]="currentStep === 3"
      [class.completed]="currentStep > 3"
      [class.inactive]="currentStep < 3"
    >
      <div class="step-icon">💳</div>
      <div class="step-text">Payment</div>
    </div>
  </div>

  <app-personal-info *ngIf="currentStep === 1" />
  <app-delivery-option *ngIf="currentStep === 2" />
  <app-payment-options *ngIf="currentStep === 3" />

  <div class="buttons">
    <button *ngIf="currentStep > 1" (click)="previousStep()">Back</button>
    <button *ngIf="currentStep < 3" (click)="nextStep()">Next</button>
  </div>
</div>
