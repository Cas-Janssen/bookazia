<div *ngIf="errorMessage == null" class="product-list">
  <app-product-item *ngFor="let product of products" [product]="product" />
</div>
<div *ngIf="errorMessage != null">
  <h1>There was an error loading the products from the database!</h1>
  <p>You can provide the following error code to the developer:</p>
  <p>{{ errorMessage }}</p>
  <button (click)="refreshProducts()">Refresh products</button>
</div>
