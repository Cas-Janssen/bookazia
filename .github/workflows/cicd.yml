name: CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: images
        shell: bash
        run: |
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/${owner_lc}/${repo_lc}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner_lc}/${repo_lc}-frontend" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        run: |
          docker build \
            -f Backend/dockerfile \
            -t ${{ steps.images.outputs.backend_image }}:${{ github.sha }} \
            -t ${{ steps.images.outputs.backend_image }}:latest \
            Backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg FRONTEND_API_URL=https://${{ secrets.DOMAIN }}/api \
            -f Frontend/dockerfile \
            -t ${{ steps.images.outputs.frontend_image }}:${{ github.sha }} \
            -t ${{ steps.images.outputs.frontend_image }}:latest \
            Frontend

      - name: Push backend image
        run: |
          docker push ${{ steps.images.outputs.backend_image }}:${{ github.sha }}
          docker push ${{ steps.images.outputs.backend_image }}:latest

      - name: Push frontend image
        run: |
          docker push ${{ steps.images.outputs.frontend_image }}:${{ github.sha }}
          docker push ${{ steps.images.outputs.frontend_image }}:latest

  deploy:
    needs: build-and-push
    runs-on:
      - server-cas
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        id: images
        shell: bash
        run: |
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/${owner_lc}/${repo_lc}-backend:latest" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner_lc}/${repo_lc}-frontend:latest" >> "$GITHUB_OUTPUT"

      - name: Prepare shared env file
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          BACKEND_IMAGE: ${{ steps.images.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend_image }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        shell: bash
        run: |
          {
            printf 'DOMAIN=%s\n' "$DOMAIN"
            printf 'TRAEFIK_NETWORK=%s\n' 'proxy'
            printf 'TRAEFIK_ENTRYPOINT=%s\n' 'https'
            printf 'TRAEFIK_CERT_RESOLVER=%s\n' 'cloudflare'
            printf 'BACKEND_IMAGE=%s\n' "$BACKEND_IMAGE"
            printf 'FRONTEND_IMAGE=%s\n' "$FRONTEND_IMAGE"
            printf 'FRONTEND_API_URL=%s\n' "https://$DOMAIN/api"
            printf 'SPRING_DATASOURCE_URL=%s\n' "$SPRING_DATASOURCE_URL"
            printf 'SPRING_DATASOURCE_USERNAME=%s\n' "$SPRING_DATASOURCE_USERNAME"
            printf 'SPRING_DATASOURCE_PASSWORD=%s\n' "$SPRING_DATASOURCE_PASSWORD"
            printf 'SPRING_JPA_HIBERNATE_DDL_AUTO=%s\n' 'update'
            printf 'SERVER_PORT=%s\n' '16741'
            printf 'SERVER_SERVLET_CONTEXT_PATH=%s\n' '/api'
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'JWT_TOKEN_EXPIRATION=%s\n' '1'
            printf 'APP_CORS_ALLOWED_ORIGINS=%s\n' "https://$DOMAIN"
          } > .env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and deploy
        run: |
          docker compose --env-file .env pull
          docker compose --env-file .env up -d --remove-orphans
