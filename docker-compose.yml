services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: bookazia-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SERVER_PORT: ${SERVER_PORT}
      SERVER_SERVLET_CONTEXT_PATH: ${SERVER_SERVLET_CONTEXT_PATH}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_TOKEN_EXPIRATION: ${JWT_TOKEN_EXPIRATION:-1}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    labels:
      - traefik.enable=true
      - traefik.http.routers.bookazia-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.bookazia-api.priority=100
      - traefik.http.routers.bookazia-api.entrypoints=${TRAEFIK_ENTRYPOINT:-https}
      - traefik.http.routers.bookazia-api.tls=true
      - traefik.http.routers.bookazia-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-cloudflare}
      - traefik.http.services.bookazia-api.loadbalancer.server.port=${SERVER_PORT}
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
    networks:
      - proxy
      - backend

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: bookazia-frontend
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.bookazia-frontend.rule=Host(`${DOMAIN}`) && !PathPrefix(`/api`)
      - traefik.http.routers.bookazia-frontend.entrypoints=${TRAEFIK_ENTRYPOINT:-https}
      - traefik.http.routers.bookazia-frontend.tls=true
      - traefik.http.routers.bookazia-frontend.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-cloudflare}
      - traefik.http.routers.bookazia-frontend.priority=1
      - traefik.http.services.bookazia-frontend.loadbalancer.server.port=80
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
    networks:
      - proxy

networks:
  proxy:
    external: true
  backend:
    external: true
